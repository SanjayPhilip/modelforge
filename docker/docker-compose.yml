version: '3.8'

services:
  # FastAPI Application
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: modelforge-api
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_EXPERIMENT_NAME=california-housing
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - MODEL_PATH=models/model.pkl
      - SCALER_PATH=models/scaler.pkl
    volumes:
      - ../models:/app/models
    depends_on:
      - mlflow
      - db
    networks:
      - modelforge-network
    restart: unless-stopped

  # MLflow Tracking Server
  mlflow:
    image: python:3.11-slim
    container_name: modelforge-mlflow
    command: >
      bash -c "pip install mlflow==2.15.0 psycopg2-binary==2.9.9 &&
               mlflow server 
               --backend-store-uri postgresql://mlflow:mlflow@db/mlflow 
               --default-artifact-root /mlflow/artifacts 
               --host 0.0.0.0 
               --port 5000"
    ports:
      - "5000:5000"
    volumes:
      - mlflow-artifacts:/mlflow/artifacts
    depends_on:
      - db
    networks:
      - modelforge-network
    restart: unless-stopped

  # PostgreSQL Database for MLflow
  db:
    image: postgres:15-alpine
    container_name: modelforge-db
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - modelforge-network
    restart: unless-stopped

  # (Optional) Prometheus for monitoring
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: modelforge-prometheus
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./prometheus.yml:/etc/prometheus/prometheus.yml
  #   networks:
  #     - modelforge-network

volumes:
  mlflow-artifacts:
  postgres-data:

networks:
  modelforge-network:
    driver: bridge
